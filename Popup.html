<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:300px;background:#0f0f1a;color:white;font-family:'Segoe UI',Arial,sans-serif;padding:20px}
    h2{font-size:20px;text-align:center;margin-bottom:4px}
    .sub{font-size:11px;color:#666;text-align:center;margin-bottom:16px}
    .xp-label{display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:6px}
    .bar-bg{background:#222;border-radius:20px;height:12px;overflow:hidden}
    .bar-fill{height:100%;border-radius:20px;background:linear-gradient(to right,#6366f1,#a855f7);transition:width 0.4s ease}
    .level{text-align:center;margin:14px 0 4px;font-size:26px}
    .level-name{text-align:center;font-size:13px;color:#aaa;margin-bottom:14px}
    .stats{display:flex;gap:10px;margin-bottom:12px}
    .stat{flex:1;background:#1a1a2e;border-radius:8px;padding:10px;text-align:center}
    .stat-num{font-size:22px;font-weight:bold}
    .stat-label{font-size:10px;color:#666;margin-top:2px}
    .stat.green .stat-num{color:#4ade80}
    .stat.red .stat-num{color:#f87171}
    #tip{font-size:12px;color:#fcd34d;background:#2a2010;border-radius:8px;padding:8px 10px;margin-bottom:12px;display:none}
    #roast{font-size:12px;color:#f87171;background:#2a1010;border-radius:8px;padding:8px 10px;margin-bottom:12px;display:none}
    .badge-title{font-size:11px;color:#666;margin-bottom:6px}
    .badges{display:flex;flex-wrap:wrap;gap:6px}
    .badge{background:#1e1e2e;border:1px solid #333;border-radius:20px;padding:4px 10px;font-size:12px}
    .badge.locked{opacity:0.25}
    .reset{width:100%;margin-top:16px;padding:8px;background:#1e1e1e;color:#666;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:12px}
    .reset:hover{color:#fff;border-color:#666}
  </style>
</head>
<body>
  <h2>🎮 Study Tabs</h2>
  <p class="sub">Browse smart. Level up.</p>
  <div class="xp-label"><span id="xp-text">0 XP</span><span id="next-text">Next: 50 XP</span></div>
  <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  <div class="level" id="level-icon">🌱</div>
  <div class="level-name" id="level-name">Beginner</div>
  <div class="stats">
    <div class="stat green"><div class="stat-num" id="stat-study">0</div><div class="stat-label">📚 Study today</div></div>
    <div class="stat red"><div class="stat-num" id="stat-distraction">0</div><div class="stat-label">😵 Distractions</div></div>
  </div>
  <div id="tip"></div>
  <div id="roast"></div>
  <div class="badge-title">BADGES</div>
  <div class="badges" id="badges"></div>
  <button class="reset" id="reset-btn">Reset Progress</button>
  <script src="popup.js"></script>
</body>
</html>
